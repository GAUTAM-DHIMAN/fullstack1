<div class="container">

  <h2>🎮 Game Catalog</h2>

  @if (games().length === 0) {

  <p class="empty-state">
    No games available yet. Add your first game!
  </p>

  } @else {

  <div class="game-grid">

    @for (game of games(); track game.id) {

    <app-game-card [game]="game" (addToCart)="addToCart($event)" (toggleAvailability)="toggleAvailability($event)">
    </app-game-card>

    }

  </div>

  }

</div>
